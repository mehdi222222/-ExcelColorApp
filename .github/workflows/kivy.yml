name: Kivy APK Builder

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y pkg-config zip unzip libncurses5 libncursesw5 libtinfo5 build-essential python3-pip python3-setuptools python3-wheel openjdk-17-jdk zlib1g-dev libffi-dev libssl-dev autoconf automake libtool cmake git

      - name: Install Buildozer
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install cython==0.29.33 buildozer==1.5.0

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: bin/*.apk
