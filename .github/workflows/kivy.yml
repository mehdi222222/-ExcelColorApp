name: Kivy APK Builder

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Update and install dependencies
      run: |
        set -x
       sudo apt update || true
        sudo apt install -y pkg-config zip unzip libncurses5 libncursesw5 libtinfo5 \
          build-essential python3-pip python3-setuptools python3-wheel openjdk-17-jdk \
          zlib1g-dev libffi-dev libssl-dev autoconf automake libtool cmake git || true
        echo "✅ Dependencies installation finished"

    - name: Install Buildozer and Python packages
      run: |
        set -x
        python3 -m pip install --upgrade pip
        python3 -m pip install cython==0.29.33 buildozer==1.5.0
        echo "✅ Buildozer installed successfully"

    - name: Fix permissions
      run: chmod -R 777 .

    - name: Build APK
      run: |
        set -x
        buildozer android debug || (echo "⚠️ Build failed but continuing"; exit 1)

    - name: Upload APK (if exists)
      if: always()
      uses: actions/upload-artifact@v4
      with:
